{# HTMX fragment: Deception Panel with success message #}

<p style="margin-top: 0; margin-bottom: 20px; font-size: 13px; color: #3fb950;">{{ message }}</p>

<div style="display: flex; gap: 20px; margin-bottom: 20px; align-items: center; justify-content: space-between;">
    <h2 style="color: #58a6ff; margin: 0; font-size: 1.4em;">Generated Deception Templates</h2>

    {# Delete controls section #}
    <div style="display: flex; gap: 8px; align-items: center;">
        {# Delete older than date #}
        <input type="date" 
               id="delete-before-date"
               style="padding: 8px 12px; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; border-radius: 4px; font-size: 0.9em; height: 36px; cursor: pointer;"
               placeholder="Select date..." />
        <button type="button"
                onClick="deletePagesBefore()"
                style="padding: 8px 14px; background: #f85149; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 500; transition: all 0.2s; height: 36px; font-size: 0.9em;"
                onmouseover="this.style.background='#f85149'; this.style.boxShadow='0 0 8px rgba(218, 54, 51, 0.4)';"
                onmouseout="this.style.background='#f85149'; this.style.boxShadow='none'">
            Delete before
        </button>

        {# Delete selected pages #}
        <button type="button"
                onClick="deleteSelectedPages()"
                style="padding: 8px 14px; background: #f85149; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 500; transition: all 0.2s; height: 36px; font-size: 0.9em;"
                onmouseover="this.style.background='#f85149'; this.style.boxShadow='0 0 8px rgba(218, 54, 51, 0.4)';"
                onmouseout="this.style.background='#f85149'; this.style.boxShadow='none'">
            Delete Selected
        </button>

        {# Delete all #}
        <button type="button"
                onClick="deleteAllPages()"
                style="padding: 8px 14px; background: #f85149; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 500; transition: all 0.2s; height: 36px; font-size: 0.9em;"
                onmouseover="this.style.background='#f85149'; this.style.boxShadow='0 0 8px rgba(218, 54, 51, 0.4)';"
                onmouseout="this.style.background='#f85149'; this.style.boxShadow='none'">
            Delete All
        </button>
    </div>
</div>

{# Generated pages table via HTMX #}
<div class="table-container">
    <div class="htmx-container" 
         hx-get="{{ dashboard_path }}/htmx/generated-pages?page=1&sort_by=created_at&sort_order=desc"
         hx-trigger="load"
         hx-swap="innerHTML">
        <div style="text-align: center; padding: 40px; color: #8b949e;">
            <span style="animation: spin 1s linear infinite;">⊙</span> Loading generated pages...
        </div>
    </div>
</div>
