{{- if and (eq .Values.mode "scalable") .Values.mariadb.enabled }}
{{- if .Values.mariadb.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "krawl.fullname" . }}-mariadb
  labels:
    {{- include "krawl.labels" . | nindent 4 }}
    app.kubernetes.io/component: mariadb
spec:
  accessModes:
    - {{ .Values.mariadb.persistence.accessMode }}
  {{- if .Values.mariadb.persistence.storageClassName }}
  storageClassName: {{ .Values.mariadb.persistence.storageClassName }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.mariadb.persistence.size }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.mariadb.host }}
  labels:
    {{- include "krawl.labels" . | nindent 4 }}
    app.kubernetes.io/component: mariadb
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.mariadb.port }}
      targetPort: mysql
      protocol: TCP
      name: mysql
  selector:
    app.kubernetes.io/name: {{ include "krawl.name" . }}-mariadb
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "krawl.fullname" . }}-mariadb
  labels:
    {{- include "krawl.labels" . | nindent 4 }}
    app.kubernetes.io/component: mariadb
spec:
  serviceName: {{ .Values.mariadb.host }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "krawl.name" . }}-mariadb
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "krawl.name" . }}-mariadb
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
      - name: mariadb
        image: "{{ .Values.mariadb.image.repository }}:{{ .Values.mariadb.image.tag }}"
        imagePullPolicy: {{ .Values.mariadb.image.pullPolicy }}
        ports:
        - name: mysql
          containerPort: 3306
          protocol: TCP
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "krawl.fullname" . }}-mariadb
              key: mariadb-root-password
        - name: MYSQL_DATABASE
          value: {{ .Values.mariadb.database | quote }}
        - name: MYSQL_USER
          value: {{ .Values.mariadb.user | quote }}
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "krawl.fullname" . }}-mariadb
              key: mariadb-password
        {{- if .Values.mariadb.persistence.enabled }}
        volumeMounts:
        - name: data
          mountPath: /var/lib/mysql
        {{- end }}
        {{- with .Values.mariadb.resources }}
        resources:
          {{- toYaml . | nindent 12 }}
        {{- end }}
        livenessProbe:
          exec:
            command:
              - healthcheck.sh
              - --connect
              - --innodb_initialized
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          exec:
            command:
              - healthcheck.sh
              - --connect
              - --innodb_initialized
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
      {{- if .Values.mariadb.persistence.enabled }}
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: {{ include "krawl.fullname" . }}-mariadb
      {{- end }}
{{- end }}
